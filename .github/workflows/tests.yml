name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall -q src tests
      - name: Validate JSON fixtures
        run: find fixtures -type f \( -name '*.json' -o -name '*.har' -o -name '*.map' \) -print0 | xargs -0 -n1 python -m json.tool >/dev/null
      - run: python -m pytest
      - run: bbs --help
      - run: bbs doctor
      - run: bash scripts/smoke_py_path.sh
