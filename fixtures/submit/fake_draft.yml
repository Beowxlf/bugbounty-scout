id: submission-fake-idor
title: Cross-user invoice metadata is exposed
vulnerability_class: idor_bola
severity_estimate: medium
confidence: high
affected_assets:
  - https://api.example.test/api/invoices/{id}
summary: A standard synthetic test user can read invoice metadata owned by another synthetic test user.
impact: Cross-user invoice metadata, including billing state, is disclosed.
steps_to_reproduce:
  - Sign in with authorized synthetic test account A.
  - Request the invoice identifier owned by authorized synthetic test account B.
  - Observe account B invoice metadata in the response.
expected_behavior: The service should deny access to invoices owned by another user.
actual_behavior: The service returns the other synthetic user's invoice metadata.
evidence_summary: Redacted request and response show the object identifier and returned metadata.
remediation: Enforce object ownership checks on every invoice lookup.
limitations: Synthetic local fixture; manual validation is required.
reporter_notes: Review program rules manually before submission.
scope_notes: Synthetic example.test assets only.
severity_rationale: Limited cross-user billing metadata disclosure without modification.
